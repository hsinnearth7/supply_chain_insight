service: "service:ChainInsightService"
labels:
  owner: chaininsight-team
  project: chaininsight
  stage: production

include:
  - "*.py"
  - "../app/forecasting/*.py"
  - "../app/rl/*.py"
  - "../configs/*.yaml"

python:
  requirements_txt: null
  packages:
    - pandas>=2.2.0
    - numpy>=1.26.0
    - scikit-learn>=1.4.0
    - lightgbm>=4.0.0
    - xgboost>=2.0.0
    - statsforecast>=1.7.0
    - torch>=2.2.0
    - stable-baselines3>=2.3.0
    - evidently>=0.4.0
    - pyyaml>=6.0
    - scipy>=1.12.0

envs:
  - name: PYTHONHASHSEED
    value: "42"
  - name: BENTOML_PORT
    value: "3000"

docker:
  python_version: "3.11"
  system_packages:
    - libgomp1
