groups:
  - name: chaininsight_alerts
    rules:
      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High error rate detected"
      - alert: HighLatency
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "P95 latency exceeds 500ms"
      - alert: DriftDetected
        expr: chaininsight_drift_detected_total > 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Model drift detected"
