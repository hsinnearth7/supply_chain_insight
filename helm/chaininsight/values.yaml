# ChainInsight Helm Chart values

nameOverride: ""
fullnameOverride: ""

backend:
  replicaCount: 2
  image:
    repository: chaininsight/backend
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 80
    targetPort: 8000
  resources:
    requests:
      memory: "512Mi"
      cpu: "500m"
    limits:
      memory: "1Gi"
      cpu: "1"
  livenessProbe:
    path: /api/health
    initialDelaySeconds: 30
    periodSeconds: 15
  readinessProbe:
    path: /api/health
    initialDelaySeconds: 10
    periodSeconds: 5
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
  env:
    LOG_LEVEL: "INFO"
    PYTHONHASHSEED: "42"
    CORS_ORIGINS: ""  # MUST be overridden — set to your production domain(s)
    MAX_UPLOAD_MB: "10"
    RATE_LIMIT_PER_MINUTE: "30"

frontend:
  replicaCount: 2
  image:
    repository: chaininsight/frontend
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 80
    targetPort: 80
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "250m"

postgresql:
  enabled: true
  image:
    repository: postgres
    tag: "16-alpine"
  auth:
    database: chaininsight
    username: chaininsight
    password: ""  # MUST be overridden — set via --set postgresql.auth.password=YOUR_PASSWORD
  persistence:
    size: 2Gi
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "512Mi"
      cpu: "500m"

redis:
  enabled: true
  image:
    repository: redis
    tag: "7-alpine"
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "128Mi"
      cpu: "100m"

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
  hosts:
    - host: ""
      paths:
        - path: /api
          pathType: Prefix
          service: backend
        - path: /
          pathType: Prefix
          service: frontend

secrets:
  apiKey: ""       # REQUIRED: Set via --set secrets.apiKey=<value>
  databaseUrl: ""  # REQUIRED: Set via --set secrets.databaseUrl=<value>
  redisUrl: ""     # REQUIRED: Set via --set secrets.redisUrl=<value>
