apiVersion: v1
kind: Service
metadata:
  name: {{ include "chaininsight.fullname" . }}-frontend
  labels:
    {{- include "chaininsight.frontendLabels" . | nindent 4 }}
spec:
  type: {{ .Values.frontend.service.type }}
  ports:
    - port: {{ .Values.frontend.service.port }}
      targetPort: {{ .Values.frontend.service.targetPort }}
      protocol: TCP
      name: http
  selector:
    {{- include "chaininsight.frontendSelectorLabels" . | nindent 4 }}
