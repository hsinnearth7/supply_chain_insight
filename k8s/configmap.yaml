apiVersion: v1
kind: ConfigMap
metadata:
  name: chaininsight-config
  namespace: chaininsight
  labels:
    app.kubernetes.io/name: chaininsight
data:
  LOG_LEVEL: "INFO"
  PYTHONHASHSEED: "42"
  # TODO: Replace with actual domain for production deployment
  # Port 5173 = Vite dev server; port 3000 = Docker Compose frontend (nginx)
  CORS_ORIGINS: "http://localhost:5173,http://localhost:3000"
  MAX_UPLOAD_MB: "10"
  RATE_LIMIT_PER_MINUTE: "30"
  UVICORN_WORKERS: "2"
  UVICORN_HOST: "0.0.0.0"
  UVICORN_PORT: "8000"
